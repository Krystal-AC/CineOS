<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android Emulator</title>
    <style>
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        #ntf {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(20,20,20,0.9); color: #fff; padding: 10px 18px;
            border-radius: 12px; border: 1px solid #333; z-index: 99;
            display: none; align-items: center; gap: 12px; backdrop-filter: blur(5px);
        }
        #ntf b { color: #3498db; }
        #btn { background: #333; border: none; color: #fff; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; }
        .ld { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; color: #444; background: #000; }
    </style>
</head>
<body>
    <div id="ntf"><span>Active: <b>Server <span id="num"></span></b></span><button id="btn">DISMISS</button></div>
    <div id="ld">Booting...</div>
    <iframe id="ifr" allowfullscreen allow="autoplay; fullscreen; gamepad; microphone; camera" referrerpolicy="no-referrer"></iframe>
    <script>
        var _s = [
            atob('Y2luZS1icm93c2VyLTEuYi1jZG4ubmV0'),
            atob('Y2luZS1icm93c2VyLTIuYi1jZG4ubmV0'),
            atob('Y2luZS1icm93c2VyLTMuYi1jZG4ubmV0')
        ];
        var _u = atob('aHR0cHM6Ly9ub3dnZy5mdW4vYXBwcy91bmN1YmUvNzA3NC9ub3cuaHRtbA==');
        var ping = function(d) {
            return fetch('https://' + d, { mode: 'no-cors' }).then(function() { return true; }).catch(function() { return false; });
        };
        async function go() {
            var i = Math.floor(Math.random() * _s.length), s = _s[i];
            if (!(await ping(s))) {
                for (var x = 0; x < _s.length; x++) {
                    if (await ping(_s[x])) { s = _s[x]; i = x; break; }
                }
            }
            var f = document.getElementById('ifr');
            f.src = 'https://' + s + '/embed.html?url=' + _u;
            f.style.display = 'block';
            document.getElementById('ld').style.display = 'none';
            document.getElementById('num').innerText = i + 1;
            document.getElementById('ntf').style.display = 'flex';
            document.getElementById('btn').onclick = function() { document.getElementById('ntf').style.display = 'none'; };
            setTimeout(function() { document.getElementById('ntf').style.display = 'none'; }, 5000);
        }
        go();
    </script>
</body>
</html>
