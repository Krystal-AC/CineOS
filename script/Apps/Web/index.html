<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cine-Web Browser</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0a0a0a;overflow:hidden;font-family:system-ui,-apple-system,sans-serif;display:flex;flex-direction:column}
#bar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#161616;border-bottom:1px solid rgba(255,255,255,0.07);flex-shrink:0}
#bar-input{flex:1;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);color:#fff;padding:8px 14px;border-radius:8px;font-size:13px;outline:none}
#bar-input:focus{border-color:rgba(66,133,244,0.6);background:rgba(66,133,244,0.08)}
.bar-btn{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.7);padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;white-space:nowrap}
.bar-btn:hover{background:rgba(255,255,255,0.12);color:#fff}
#ifr{flex:1;border:none;background:#fff}
#err{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:#0a0a0a;color:rgba(255,255,255,0.5);text-align:center;padding:32px}
#err .big{font-size:48px;margin-bottom:8px}
#err .msg{font-size:15px;color:rgba(255,255,255,0.7)}
#err .sub{font-size:13px;max-width:320px;line-height:1.6}
.err-btn{padding:10px 22px;background:rgba(66,133,244,0.2);border:1px solid rgba(66,133,244,0.4);color:#fff;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;margin-top:4px}
.err-btn:hover{background:rgba(66,133,244,0.35)}
</style>
</head>
<body>
<div id="bar">
  <input id="bar-input" type="text" placeholder="Enter URL or search..." value="https://www.google.com" onkeydown="if(event.key==='Enter')navigate()">
  <button class="bar-btn" onclick="navigate()">Go</button>
  <button class="bar-btn" onclick="openTab()">&#8599; New Tab</button>
</div>
<iframe id="ifr" allow="autoplay;fullscreen;gamepad" referrerpolicy="no-referrer"></iframe>
<div id="err">
  <div class="big">&#128683;</div>
  <div class="msg">This site blocks embedding</div>
  <div class="sub">Many websites prevent being shown inside other pages. Try opening it directly instead.</div>
  <button class="err-btn" onclick="openTab()">Open in New Tab</button>
  <button class="err-btn" onclick="tryNavigate(atob('aHR0cHM6Ly93d3cuZ29vZ2xlLmNvbQ=='))">Back to Google</button>
</div>
<script>
var _current = atob('aHR0cHM6Ly93d3cuZ29vZ2xlLmNvbQ==');
var f = document.getElementById('ifr');
var inp = document.getElementById('bar-input');
var err = document.getElementById('err');

function tryNavigate(url){
  _current = url;
  inp.value = url;
  err.style.display='none';
  f.style.display='block';
  setTimeout(function(){ f.src = url; }, 0);
}

function navigate(){
  var v = inp.value.trim();
  if(!v) return;
  if(!/^https?:\/\//i.test(v)) v = 'https://' + v;
  tryNavigate(v);
}

function openTab(){ window.open(_current,'_blank'); }

f.addEventListener('load', function(){
  try {
    var _ = f.contentDocument;
    err.style.display = 'none';
  } catch(e) {
    err.style.display = 'flex';
    f.style.display = 'none';
  }
});

tryNavigate(_current);
</script>
</body>
</html>
